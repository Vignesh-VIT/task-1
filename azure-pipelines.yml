name: $(Date:yyyyMMddhhmmss).$(SourceBranchName).$(Build.SourceVersion)

trigger:
  - main
  - feature/*

pool:
  vmImage: 'ubuntu-latest'

jobs:
  - job: build_and_push
    displayName: 'Build and Push Flask App'
    
    steps:
    - task: Docker@2
      displayName: 'Build Docker Image'
      inputs:
        command: build
        Dockerfile: '**/Dockerfile'
        repository: vigneshtrail.jfrog.io/vignesh-docker/flask-app
        tags: azure

    - task: Docker@2
      displayName: 'Login to JFrog Artifactory'
      inputs:
        command: login
        containerRegistry: 'JFrogConnection'
        
    - script: |
        docker push vigneshtrail.jfrog.io/vignesh-docker/flask-app:azure
      displayName: 'Push Docker Image to JFrog'

    - task: Bash@3
      displayName: 'Send Teams Notification'
      inputs:
        targetType: 'inline'
        script: |
          curl -H 'Content-Type: application/json' -d '{
            "title": "Build Notification",
            "text": "Build $(Build.BuildNumber) finished with status $(Build.Status)"
          }' https://bosch.webhook.office.com/webhookb2/b37a760c-b541-4be3-b9c5-1747ac499e98@0ae51e19-07c8-4e4b-bb6d-648ee58410f4/IncomingWebhook/2bdf5bce82fa4600a0526f987644534a/8578a3cb-b1ed-446d-b381-b0de63a9121f/V2FJ9mZOc6NL7pbDHY1ovffMZ4XFPCdzEtWUcb9iFuEFg1